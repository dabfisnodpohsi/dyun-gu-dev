apiVersion: dg/v1
kind: Graph
nodes:
  - name: frames
    kind: source
    params:
      count: 3
      shape: [1, 3, 2, 2]
      dtype: f32
      format: nchw
      start: 0.5
  - name: fanout
    kind: distributor
    params:
      strategy: broadcast
  - name: classifier
    kind: resnet_preprocess
    params:
      input_width: 2
      input_height: 2
  - name: classification_inference
    kind: mock_inference
    params:
      shape: [1, 3, 2, 2]
      output_shape: [1, 6]
      echo_inputs: false
  - name: classification
    kind: resnet_postprocess
    params:
      top_k: 3
      labels: [person, vehicle, background, animal, text, other]
  - name: classification_sink
    kind: sink
    params: {}
  - name: detector
    kind: yolo_preprocess
    params:
      input_width: 2
      input_height: 2
  - name: detection_inference
    kind: mock_inference
    params:
      shape: [1, 3, 2, 2]
      output_shape: [1, 6]
      echo_inputs: false
  - name: detections
    kind: yolo_postprocess
    params:
      input_height: 2
      input_width: 2
      class_count: 1
      confidence_threshold: 0.25
      nms_threshold: 0.45
  - name: tracker
    kind: bytetrack
    params:
      max_lost: 2
      match_iou: 0.3
  - name: tracking_sink
    kind: sink
    params: {}
connections:
  - frames.out -> fanout.in
  - fanout.out0 -> classifier.in
  - classifier.out -> classification_inference.in
  - classification_inference.out -> classification.in
  - classification.out -> classification_sink.in
  - fanout.out1 -> detector.in
  - detector.out -> detection_inference.in
  - detection_inference.out -> detections.in
  - detections.out -> tracker.in
  - tracker.out -> tracking_sink.in
