apiVersion: dg/v1
kind: Graph
nodes:
  - name: input_a
    kind: rtsp_src
    params:
      url: mock://demo/input-a
  - name: decode_a
    kind: media_decode
    params:
      width: 2
      height: 2
      channels: 3
  - name: resize_a
    kind: media_resize
    params:
      width: 2
      height: 2
  - name: detect_pre_a
    kind: yolo_preprocess
    params:
      input_width: 2
      input_height: 2
  - name: infer_a
    kind: mock_inference
    params:
      shape: [1, 3, 2, 2]
      output_shape: [1, 6]
      echo_inputs: false
      fill_value: 0
  - name: detect_post_a
    kind: yolo_postprocess
    params:
      input_width: 2
      input_height: 2
      class_count: 1
      confidence_threshold: 0.2
  - name: track_a
    kind: bytetrack
    params:
      max_lost: 2
      match_iou: 0.3
  - name: osd_a
    kind: media_osd
    params:
      boxes:
        - x: 0
          y: 0
          width: 1
          height: 1
      color: [255, 0, 0]
      thickness: 1
  - name: encode_a
    kind: media_encode
    params: {}
  - name: output_a
    kind: rtmp_sink
    params:
      url: mock://demo/output-a
  - name: track_output_a
    kind: sink
    params: {}

  - name: input_b
    kind: rtsp_src
    params:
      url: mock://demo/input-b
  - name: decode_b
    kind: media_decode
    params:
      width: 2
      height: 2
      channels: 3
  - name: resize_b
    kind: media_resize
    params:
      width: 2
      height: 2
  - name: detect_pre_b
    kind: yolo_preprocess
    params:
      input_width: 2
      input_height: 2
  - name: infer_b
    kind: mock_inference
    params:
      shape: [1, 3, 2, 2]
      output_shape: [1, 6]
      echo_inputs: false
      fill_value: 0
  - name: detect_post_b
    kind: yolo_postprocess
    params:
      input_width: 2
      input_height: 2
      class_count: 1
      confidence_threshold: 0.2
  - name: track_b
    kind: bytetrack
    params:
      max_lost: 2
      match_iou: 0.3
  - name: osd_b
    kind: media_osd
    params:
      boxes:
        - x: 0
          y: 0
          width: 1
          height: 1
      color: [0, 255, 0]
      thickness: 1
  - name: encode_b
    kind: media_encode
    params: {}
  - name: output_b
    kind: rtmp_sink
    params:
      url: mock://demo/output-b
  - name: track_output_b
    kind: sink
    params: {}

connections:
  - input_a.out -> decode_a.in
  - decode_a.out -> resize_a.in
  - resize_a.out -> detect_pre_a.in
  - detect_pre_a.out -> infer_a.in
  - infer_a.out -> detect_post_a.in
  - detect_post_a.out -> track_a.in
  - track_a.out -> track_output_a.in
  - resize_a.out -> osd_a.in
  - osd_a.out -> encode_a.in
  - encode_a.out -> output_a.in
  - input_b.out -> decode_b.in
  - decode_b.out -> resize_b.in
  - resize_b.out -> detect_pre_b.in
  - detect_pre_b.out -> infer_b.in
  - infer_b.out -> detect_post_b.in
  - detect_post_b.out -> track_b.in
  - track_b.out -> track_output_b.in
  - resize_b.out -> osd_b.in
  - osd_b.out -> encode_b.in
  - encode_b.out -> output_b.in
