language = "C"
include_guard = "DG_CAPI_H"
pragma_once = true
autogen_warning = "/* Generated by cbindgen; do not edit. */"
documentation = true
line_length = 100
style = "both"
usize_is_size_t = true

[export]
include = [
    "DgStatus",
    "DgGraphFormat",
    "DgDataType",
    "DgDataFormat",
    "DgDeviceKind",
    "DgMemoryDomain",
    "DgEngine",
    "DgTensor",
    "DgBuffer",
    "DgBackend",
    "DgBackendKind",
    "DgBackendCapabilities",
    "DgTensorInfo",
]

[struct]
rename_fields = "None"

[defines]
"target_os = linux" = "DG_TARGET_LINUX"
